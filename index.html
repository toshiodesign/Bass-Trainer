<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bass & Rhythm Mastery</title>
    <style>
        /* --- 共用 CSS Variables --- */
        :root {
            --bg-body: #121212;
            --bg-app: #1E1E1E;
            --text-main: #E0E0E0;
            --text-sub: #A0A0A0;
            
            --fret-line: #444444;
            --nut-line: #888888;
            --string-line: #555555;
            --inlay: #000000;
            
            --note-root: #D35400;   
            --note-active: #3498DB; 
            --note-extension: #9B59B6; 
            --note-ghost: #2C2C2C;  
            
            --note-text-active: #ffffff;
            --note-text-ghost: #555555;

            --btn-bg: #2C2C2C;
            --btn-border: #444444;
            --btn-active-bg: #3498DB;
            --btn-active-text: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 15px 10px 100px 10px; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent; 
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .module-panel {
            background: var(--bg-app);
            border-radius: 12px;
            border: 1px solid var(--btn-border);
            box-shadow: 0 6px 25px rgba(0,0,0,0.4);
            overflow: hidden;
            position: relative;
        }

        .header-section {
            padding: 12px 20px;
            border-bottom: 1px solid var(--fret-line);
            background: var(--bg-app);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 { margin: 0; font-size: 1.1rem; color: var(--text-main); font-weight: 600; letter-spacing: 0.5px;}
        
        .header-actions { display: flex; align-items: center; gap: 10px; }

        .settings-panel {
            max-height: 500px;
            opacity: 1;
            overflow: hidden;
            transition: all 0.3s ease-in-out;
            border-bottom: 1px solid var(--fret-line);
        }
        .settings-panel.collapsed {
            max-height: 0;
            opacity: 0;
            border-bottom: none;
            margin: 0; padding-top: 0; padding-bottom: 0;
        }

        select {
            padding: 8px 12px; font-size: 0.9rem; border: 1px solid var(--btn-border);
            border-radius: 6px; background-color: var(--bg-body); color: var(--text-main);
            outline: none; cursor: pointer; flex: 1; min-width: 120px;
        }
        select:focus { border-color: var(--note-active); }
        select optgroup { background-color: var(--bg-app); color: var(--text-sub); }

        /* =========================================
           MODULE 1: FRETBOARD TRAINER
        ========================================= */
        .controls-row {
            display: flex; gap: 8px; flex-wrap: wrap; align-items: center; 
            padding: 15px 20px; background: rgba(0,0,0,0.2);
        }

        #exerciseModeSelect, #stringPairSelect, #stringTripletSelect, #stringQuadSelect, #stringQuintSelect, #chordTypeSelect, #arpeggioStringSelect {
            border-color: var(--note-active); font-weight: bold;
        }

        .toggle-container {
            display: flex; align-items: center; gap: 6px;
            background: var(--bg-body); padding: 5px 12px;
            border-radius: 20px; font-size: 0.85rem; cursor: pointer;
            border: 1px solid var(--btn-border);
        }
        
        .toggle-switch {
            position: relative; width: 36px; height: 18px;
            background-color: #555; border-radius: 20px; transition: 0.3s;
        }
        .toggle-switch::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 14px; height: 14px; background-color: white;
            border-radius: 50%; transition: 0.3s;
        }
        #multiModeCheck:checked + .toggle-switch { background-color: var(--note-active); }
        input[type="checkbox"]:checked + .toggle-switch::after { transform: translateX(18px); }

        .pos-buttons-container {
            display: flex; gap: 8px; overflow-x: auto; padding: 12px 20px;
            background: var(--bg-app); border-bottom: 1px solid var(--fret-line);
            scrollbar-width: none; scroll-behavior: smooth;
        }
        .pos-buttons-container::-webkit-scrollbar { display: none; }

        .pos-btn {
            white-space: nowrap; padding: 8px 16px; border: 1px solid var(--btn-border);
            background: var(--btn-bg); color: var(--text-sub); border-radius: 20px;
            cursor: pointer; font-size: 0.85rem; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; min-width: 80px;
        }
        .pos-btn span.mode-name { font-size: 0.7rem; opacity: 0.8; margin-top: 3px; }
        .pos-btn.active {
            background: var(--btn-active-bg); color: var(--btn-active-text);
            border-color: var(--btn-active-bg); font-weight: 600; transform: scale(1.05);
        }

        .fretboard-wrapper {
            width: 100%; height: 40vh; min-height: 250px; background: var(--bg-app);
            position: relative; overflow: hidden; touch-action: none; cursor: grab;
        }
        .fretboard-wrapper:active { cursor: grabbing; }
        svg { display: block; width: 100%; height: 100%; pointer-events: none; }

        .legend {
            display: flex; gap: 15px; padding: 12px 20px; font-size: 0.8rem;
            background: var(--bg-body); border-top: 1px solid var(--fret-line);
            justify-content: center; flex-wrap: wrap; color: var(--text-sub);
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .note-text { font-family: inherit; font-weight: bold; font-size: 10px; }
        
        .hidden { display: none !important; }

        /* =========================================
           MODULE 2: RHYTHM TRAINER
        ========================================= */
        .rhythm-controls-top {
            display: flex; flex-wrap: wrap; gap: 20px; justify-content: space-around;
            padding: 15px 20px; background: rgba(0,0,0,0.2);
        }

        .rc-group { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; min-width: 100px; }
        .rc-label { font-size: 0.8rem; color: var(--text-sub); font-weight: normal; }
        .val-display { font-size: 0.9rem; font-weight: bold; color: var(--note-active); }

        input[type="range"] { -webkit-appearance: none; width: 100%; max-width: 120px; background: transparent; height: 20px; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: var(--btn-border); border-radius: 2px;}
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 18px; width: 18px; 
            border-radius: 50%; background: var(--note-active); margin-top: -7px; cursor: pointer; 
        }

        .rhythm-stage {
            display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center;
            background: var(--bg-body); padding: 30px 20px; min-height: 140px;
        }

        .beat-card {
            border: 2px solid var(--btn-border); border-radius: 8px; width: 100px; height: 100px;
            display: flex; justify-content: center; align-items: center; transition: 0.15s ease;
            background: var(--btn-bg); cursor: pointer; /* 加上游標提示可以點擊 */
        }
        .beat-card.active {
            border-color: var(--note-active); transform: scale(1.05);
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.3); background: var(--bg-app);
        }
        .beat-card.changing { animation: cardUpdate 0.2s; border-color: var(--note-extension);}
        @keyframes cardUpdate { 0% { opacity: 0.5; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        
        .beat-card .svg-container { width: 70%; height: 70%; opacity: 0.6; transition: 0.15s; pointer-events: none; }
        .beat-card.active .svg-container { opacity: 1; }
        .beat-card svg { width: 100%; height: 100%; fill: var(--text-main); }

        .library-panel { background: var(--bg-app); padding: 20px; border-top: 1px solid var(--fret-line); }
        .library-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .library-title { font-size: 1rem; font-weight: bold; color: var(--text-main); }
        
        .pattern-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 10px; max-height: 400px; overflow-y: auto; transition: 0.3s; }
        .pattern-grid.collapsed { max-height: 0; opacity: 0; margin: 0; overflow: hidden; }
        
        .pattern-item {
            aspect-ratio: 1; border: 1px solid var(--btn-border); background: var(--btn-bg); border-radius: 6px;
            cursor: pointer; display: flex; justify-content: center; align-items: center; padding: 6px; opacity: 0.5; transition: 0.2s;
        }
        .pattern-item:hover { border-color: var(--text-sub); opacity: 0.8; }
        .pattern-item.selected { border-color: var(--note-active); opacity: 1; background: rgba(52, 152, 219, 0.15); box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);}
        .pattern-item svg { width: 100%; height: 100%; pointer-events: none; fill: var(--text-main); }

        /* =========================================
           ✨ 懸浮控制列
        ========================================= */
        .fixed-bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--btn-border);
            display: flex; align-items: center; justify-content: center; gap: 20px;
            padding: 15px 10px; z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            padding-bottom: max(15px, env(safe-area-inset-bottom));
        }

        .btn-circle {
            width: 60px; height: 60px; border-radius: 50%; background: var(--btn-bg);
            border: 2px solid var(--btn-border); color: var(--text-main);
            cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s;
        }
        .btn-circle:hover { border-color: var(--note-active); color: var(--note-active); }
        .btn-circle.playing {
            border-color: var(--note-active); color: var(--btn-active-text);
            background: var(--note-active); box-shadow: 0 0 15px rgba(52, 152, 219, 0.4);
        }

        .btn-pill {
            padding: 12px 24px; border-radius: 30px; border: 1px solid var(--btn-border);
            background: var(--btn-bg); color: var(--text-sub); font-size: 0.9rem; font-weight: bold;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .btn-pill:hover { border-color: var(--note-active); color: var(--text-main); }
        .btn-pill.active { background: var(--btn-active-bg); color: var(--btn-active-text); border-color: var(--btn-active-bg); }

        .icon-btn { 
            padding: 6px 12px; font-size: 1rem; border-radius: 6px; border: 1px solid var(--btn-border); 
            background: var(--btn-bg); color: var(--text-main); cursor: pointer; transition: 0.2s;
        }
        .icon-btn:hover { background: var(--btn-border); }
        .icon-btn.active { background: var(--note-active); border-color: var(--note-active); color: white; }

        .btn-sm { padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; border: 1px solid var(--btn-border); background: var(--btn-bg); color: var(--text-main); cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-sm:hover { background: var(--note-active); border-color: var(--note-active); color: var(--btn-active-text);}

        /* 📱 橫豎屏自適應 */
        @media screen and (orientation: landscape) and (max-height: 600px) {
            body { padding-top: 5px; }
            .header-section { display: none; } 
            .legend { display: none; }         
            .fretboard-wrapper { height: 60vh; }
            .rhythm-stage { min-height: 100px; padding: 15px; }
            .beat-card { width: 80px; height: 80px; }
        }

    </style>
    <script>window.ALL_PATTERNS = [];</script>
</head>
<body>

    <div class="app-container">
        
        <div class="module-panel">
            <div class="header-section">
                <div class="header-top">
                    <h1>Bass Fretboard</h1>
                    <div class="header-actions">
                        <label class="toggle-container">
                            <input type="checkbox" id="multiModeCheck">
                            <div class="toggle-switch"></div>
                            <span>Multi</span>
                        </label>
                        <button class="icon-btn" id="toggleFretSettingsBtn">⚙️</button>
                    </div>
                </div>
            </div>
            
            <div class="settings-panel collapsed" id="fretSettings">
                <div class="controls-row">
                    <select id="exerciseModeSelect">
                        <option value="scale">模式: 全指板音階</option><option value="arpeggio" selected>模式: 和弦指法</option><option value="pair_drill">模式: 雙弦模進</option><option value="triplet_drill">模式: 三弦模進</option><option value="quad_drill">模式: 四弦模進</option><option value="quint_drill">模式: 五弦模進</option>
                    </select>
                    <select id="keySelect">
                        <option value="0">Key: C</option><option value="1">Key: Db</option><option value="2">Key: D</option><option value="3">Key: Eb</option><option value="4">Key: E</option><option value="5">Key: F</option><option value="6">Key: Gb</option><option value="7">Key: G</option><option value="8">Key: Ab</option><option value="9">Key: A</option><option value="10">Key: Bb</option><option value="11">Key: B</option>
                    </select>
                    <select id="scaleSelect" class="hidden">
                        <optgroup label="Basic Scales"><option value="major">Major (Ionian)</option><option value="minor">Natural Minor</option><option value="maj_pent">Major Pentatonic</option><option value="min_pent">Minor Pentatonic</option></optgroup>
                    </select>
                    <select id="chordTypeSelect" class="hidden">
                        <optgroup label="三和弦"><option value="maj">Major</option><option value="min">Minor</option><option value="dim">Diminished</option><option value="aug">Augmented</option></optgroup>
                        <optgroup label="七和弦"><option value="maj7">Maj7</option><option value="dom7">Dom 7</option><option value="min7">m7</option><option value="m7b5">m7b5</option><option value="dim7">dim7</option><option value="mM7">mM7</option></optgroup>
                    </select>
                    <select id="arpeggioStringSelect" class="hidden">
                        <option value="4">起始弦: B String</option><option value="3" selected>起始弦: E String</option><option value="2">起始弦: A String</option><option value="1">起始弦: D String</option>
                    </select>
                    <select id="stringPairSelect" class="hidden"><option value="0,1">D & G (High)</option><option value="1,2">A & D (Mid)</option><option value="2,3">E & A (Mid-Low)</option><option value="3,4">B & E (Low)</option></select>
                    <select id="stringTripletSelect" class="hidden"><option value="0,1,2">A-D-G (High)</option><option value="1,2,3">E-A-D (Std)</option><option value="2,3,4" selected>B-E-A (Low)</option></select>
                    <select id="stringQuadSelect" class="hidden"><option value="0,1,2,3">E-A-D-G (Std 4)</option><option value="1,2,3,4" selected>B-E-A-D (Low 4)</option></select>
                    <select id="stringQuintSelect" class="hidden"><option value="0,1,2,3,4" selected>B-E-A-D-G (Full 5)</option></select>
                    <select id="viewModeSelect">
                        <option value="notes">顯示: 音名</option><option value="solfege">顯示: 唱名</option><option value="intervals" selected>顯示: 級數</option>
                    </select>
                </div>
            </div>

            <div class="pos-buttons-container" id="posBtnContainer"></div>

            <div class="fretboard-wrapper" id="zoomContainer">
                <svg id="fretboard" viewBox="0 0 1650 240" preserveAspectRatio="xMidYMid meet"></svg>
            </div>

            <div class="legend">
                <div class="legend-item"><span class="dot" style="background:var(--note-root)"></span>根音</div>
                <div class="legend-item"><span class="dot" style="background:var(--note-active)"></span>組成音</div>
                <div class="legend-item"><span class="dot" style="background:var(--note-extension)"></span>特徵音</div>
            </div>
        </div>

        <div class="module-panel">
            <div class="header-section">
                <div class="header-top">
                    <h1>Rhythm Generator</h1>
                    <button class="icon-btn" id="toggleRhythmSettingsBtn">⚙️</button>
                </div>
            </div>
            
            <div class="settings-panel collapsed" id="rhythmSettings">
                <div class="rhythm-controls-top">
                    <div class="rc-group">
                        <span class="rc-label">Meter</span>
                        <select id="timeSigSelect">
                            <option value="4/4" selected>4/4 SIMPLE</option><option value="2/4">2/4 SIMPLE</option><option value="3/4">3/4 SIMPLE</option><option value="5/4">5/4 SIMPLE</option><option disabled>──────────</option><option value="6/8">6/8 COMPOUND</option><option value="9/8">9/8 COMPOUND</option><option value="12/8">12/8 COMPOUND</option>
                        </select>
                    </div>
                    <div class="rc-group">
                        <span class="rc-label">Tempo (<span id="bpmDisplay">100</span>)</span>
                        <input type="range" id="bpmSlider" min="40" max="200" value="100">
                    </div>
                    <div class="rc-group">
                        <span class="rc-label">Kick Vol</span>
                        <input type="range" id="kickVolSlider" min="0" max="100" value="80">
                    </div>
                    <div class="rc-group">
                        <span class="rc-label">Clap Vol</span>
                        <input type="range" id="clapVolSlider" min="0" max="100" value="80">
                    </div>
                    <div class="rc-group">
                        <span class="rc-label">Chaos (<span id="shuffleDisplay">0%</span>)</span>
                        <input type="range" id="shuffleSlider" min="0" max="100" value="0">
                    </div>
                </div>
            </div>

            <div class="rhythm-stage" id="displayArea"></div>

            <div class="library-panel">
                <div class="library-header">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <button class="btn-sm" id="toggleLibBtn">▼</button>
                        <span class="library-title" id="libTitle">Pattern Library</span>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-sm" id="selectAllBtn">ALL</button>
                        <button class="btn-sm" id="deselectAllBtn">NONE</button>
                    </div>
                </div>
                <div class="pattern-grid" id="libraryGrid"></div>
            </div>
        </div>

    </div>

    <div class="fixed-bottom-bar">
        <button class="btn-pill" id="randomRhythmBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
            重骰
        </button>
        <button class="btn-circle" id="playBtn">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="btn-pill active" id="kickBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>
            大鼓
        </button>
    </div>

    <script src="rhythm_data_1.js"></script>
    <script src="rhythm_data_2.js"></script>
    <script src="rhythm_data_3.js"></script>
    <script src="rhythm_data_4.js"></script>
    <script src="rhythm_data_5.js"></script>
    <script src="rhythm_data_6.js"></script>
    <script src="rhythm_data_7.js"></script>
    <script src="rhythm_data_8.js"></script>
    <script src="app.js"></script>
</body>
</html>
